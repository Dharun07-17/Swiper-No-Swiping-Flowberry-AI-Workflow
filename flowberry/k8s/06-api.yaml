apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: flowberry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: flowberry-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: flowberry-config
            - secretRef:
                name: flowberry-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: flowberry
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
