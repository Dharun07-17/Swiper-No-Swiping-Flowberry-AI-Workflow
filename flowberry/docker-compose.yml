services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - flowberry-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+psycopg2://flowberry:flowberry@postgres:5432/flowberry
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - JWT_SECRET=${JWT_SECRET}
      - FERNET_KEY=${FERNET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - rabbitmq
      - otel-collector
    networks:
      - flowberry-net

  worker-email:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker-email
    environment:
      - DATABASE_URL=postgresql+psycopg2://flowberry:flowberry@postgres:5432/flowberry
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - JWT_SECRET=${JWT_SECRET}
      - FERNET_KEY=${FERNET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - flowberry-net
    deploy:
      replicas: 2

  worker-calendar:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker-calendar
    environment:
      - DATABASE_URL=postgresql+psycopg2://flowberry:flowberry@postgres:5432/flowberry
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - JWT_SECRET=${JWT_SECRET}
      - FERNET_KEY=${FERNET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - flowberry-net
    volumes:
      - ./backend/app/report_outputs:/app/app/report_outputs

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=flowberry
      - POSTGRES_USER=flowberry
      - POSTGRES_PASSWORD=flowberry
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - flowberry-net

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - flowberry-net

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - flowberry-net

  loki:
    image: grafana/loki:3.2.1
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    networks:
      - flowberry-net

  grafana:
    image: grafana/grafana:11.3.1
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki
    networks:
      - flowberry-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/otel/otel-collector-config.yml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - flowberry-net

volumes:
  pg-data:

networks:
  flowberry-net:
    driver: bridge
